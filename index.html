<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Saku — Budget Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: #1F1B2E;
    background-image:
      radial-gradient(ellipse 60% 50% at 18% 12%, rgba(124,92,252,0.32) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 86% 88%, rgba(255,107,107,0.20) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 92% 10%, rgba(197,247,79,0.10) 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    color: #1A1625;
  }
  #root { width: 100%; display: flex; justify-content: center; }
  * { box-sizing: border-box; }
  button { font-family: inherit; border: none; cursor: pointer; background: none; padding: 0; color: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .saku-scroll::-webkit-scrollbar { display: none; }
  @keyframes saku-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes saku-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes saku-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes saku-pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes saku-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script type="text/babel" src="firebase.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-more.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>

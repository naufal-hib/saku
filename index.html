<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: #F4F1EA;
    min-height: 100vh;
    color: #1A1625;
  }
  #root { width: 100%; }
  * { box-sizing: border-box; }
  button { font-family: inherit; border: none; cursor: pointer; background: none; padding: 0; color: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .saku-scroll::-webkit-scrollbar { display: none; }
  @keyframes saku-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes saku-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes saku-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes saku-pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes saku-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  :root { --sab: env(safe-area-inset-bottom, 0px); --sat: env(safe-area-inset-top, 0px); }
</style>
<script>
// Generate iOS apple-touch-icon via Canvas (PNG required for iOS home screen)
(function() {
  try {
    var c = document.createElement('canvas');
    c.width = c.height = 180;
    var ctx = c.getContext('2d');
    // Background rounded rect
    ctx.beginPath();
    var r = 40, w = 180, h = 180;
    ctx.moveTo(r, 0); ctx.lineTo(w-r, 0); ctx.arcTo(w, 0, w, r, r);
    ctx.lineTo(w, h-r); ctx.arcTo(w, h, w-r, h, r);
    ctx.lineTo(r, h); ctx.arcTo(0, h, 0, h-r, r);
    ctx.lineTo(0, r); ctx.arcTo(0, 0, r, 0, r);
    ctx.closePath();
    var bg = ctx.createLinearGradient(0, 0, 180, 180);
    bg.addColorStop(0, '#1A1625'); bg.addColorStop(1, '#2A1F4A');
    ctx.fillStyle = bg; ctx.fill();
    // S stroke
    var g = ctx.createLinearGradient(0, 0, 180, 180);
    g.addColorStop(0, '#C5F74F'); g.addColorStop(1, '#7C5CFC');
    ctx.strokeStyle = g; ctx.lineWidth = 16; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    var s = 180/512;
    ctx.beginPath();
    ctx.moveTo(330*s, 198*s);
    ctx.bezierCurveTo(330*s,161*s, 302*s,133*s, 256*s,133*s);
    ctx.bezierCurveTo(210*s,133*s, 182*s,161*s, 182*s,198*s);
    ctx.bezierCurveTo(182*s,235*s, 212*s,252*s, 256*s,264*s);
    ctx.bezierCurveTo(300*s,276*s, 330*s,293*s, 330*s,330*s);
    ctx.bezierCurveTo(330*s,367*s, 300*s,391*s, 256*s,391*s);
    ctx.bezierCurveTo(212*s,391*s, 182*s,367*s, 182*s,330*s);
    ctx.stroke();
    var lnk = document.querySelector('link[rel="apple-touch-icon"]');
    if (lnk) lnk.href = c.toDataURL('image/png');
  } catch(e) {}
})();
</script>
</head>

<div id="root"></div>
